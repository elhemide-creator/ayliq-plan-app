<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"> 
    <title>Aylıq Plan Hesablayıcı</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Honk&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="popup.css"> 
</head>
<body>
    
    <div id="widget_handle" class="hidden">◀</div>

    <div class="top-bar">
        <button id="settings_btn" class="icon-btn">⚙️ Ayarlar</button>
        <button class="lang-button" id="theme_toggle">☀️/🌙</button>
    </div>

    <div class="header-logo">HemidEziz</div>

    <div class="lang-switcher">
        <button class="lang-button" id="lang-az" data-lang="az">AZ</button>
        <button class="lang-button" id="lang-en" data-lang="en">EN</button>
        <button class="lang-button" id="lang-ru" data-lang="ru">RU</button>
        <button class="lang-button" id="lang-tr" data-lang="tr">TR</button>
    </div>

    <div class="tab-menu">
        <button class="tab-link active" data-target="plan" id="tab_plan">Plan</button>
        <button class="tab-link" data-target="workhours" id="tab_workhours">İş Saatı</button>
        <button class="tab-link" data-target="crm" id="tab_crm">CRM Xəta</button>
    </div>
    
    <div id="main-content"></div>

    <button id="exit_mini_btn" class="primary-btn hidden" style="margin-top: 15px; background: #6c757d; border-color: #6c757d; color: white;">⛶ Normal Rejimə Qayıt</button>

    <div id="settings_modal" class="modal hidden">
        <div class="modal-content">
            <h3 style="text-align: center; margin-top:0;">Ayarlar</h3>
            <div class="setting-item">
                <label>Fərdiləşdirilmiş Neon Rəngi:</label>
                <input type="color" id="neon_color_picker" value="#00eaff">
            </div>
            <div class="setting-item">
                <label style="display:flex; align-items:center; cursor:pointer;">
                    <input type="checkbox" id="startup_toggle" style="margin-right:10px; width:18px; height:18px;"> 
                    Kompüter açılanda avtomatik başlasın
                </label>
            </div>
            <div class="setting-item" style="border-top:1px solid var(--border-color); padding-top:10px;">
                <label style="display:flex; align-items:center; cursor:pointer; color: var(--danger-color); font-weight:bold;">
                    <input type="checkbox" id="mini_mode_toggle" style="margin-right:10px; width:18px; height:18px;"> 
                    Mini-Rejim (Ekranın sağında Widget kimi)
                </label>
            </div>
            <button id="close_settings" class="primary-btn">Yadda Saxla & Bağla</button>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
